<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>ASTY Blog Agent · 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script>
  const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
    "accent": "#b66f1c",
    "density": "comfortable",
    "animatedEdges": true,
    "serifArticle": true
  }/*EDITMODE-END*/;
  window.__TWEAKS = {...TWEAK_DEFAULS};
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>

<script type="text/babel" src="components/Icons.jsx"></script>
<script type="text/babel" src="components/Primitives.jsx"></script>
<script type="text/babel" src="components/Shell.jsx"></script>
<script type="text/babel" src="components/pages/Overview.jsx"></script>
<script type="text/babel" src="components/pages/AgentFlow.jsx"></script>
<script type="text/babel" src="components/pages/WeeklyRun.jsx"></script>
<script type="text/babel" src="components/pages/Drafts.jsx"></script>
<script type="text/babel" src="components/pages/Publish.jsx"></script>
<script type="text/babel" src="components/pages/Misc.jsx"></script>
<script type="text/babel" src="components/pages/Phase7_12.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App(){
  const initial = (()=>{ try { return localStorage.getItem('asty.route') || 'overview'; } catch(e){ return 'overview'; }})();
  const [route, setRoute] = useState(initial);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(window.__TWEAKS);

  useEffect(()=>{ try{ localStorage.setItem('asty.route', route); }catch(e){} }, [route]);

  // Tweak protocol
  useEffect(()=>{
    const onMsg = (e) => {
      if(!e.data || typeof e.data !== 'object') return;
      if(e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if(e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Apply accent tweak
  useEffect(()=>{
    document.documentElement.style.setProperty('--accent', tweaks.accent);
    document.documentElement.style.setProperty('--accent-ink', tweaks.accent);
    document.body.style.setProperty('--density', tweaks.density);
  },[tweaks]);

  const setTweak = (patch) => {
    const next = {...tweaks, ...patch};
    setTweaks(next);
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: patch}, '*');
  };

  const pages = {
    overview:  <Overview goto={setRoute}/>,
    direction: <Direction/>,
    agents:    <AgentFlow/>,
    weekly:    <WeeklyRun/>,
    drafts:    <Drafts/>,
    queue:     <PublishQueue/>,
    publish:   <Publish/>,
    topics:    <Topics/>,
    glossary:  <Glossary/>,
    graph:     <GraphExplorer/>,
    gsc:       <GSC/>,
    portfolio: <Portfolio/>,
    analytics: <Analytics/>,
    logs:      <Logs/>,
    settings:  <Settings/>,
  };

  return (
    <div className="app" data-screen-label={ROUTE_TITLES[route]}>
      <Sidebar route={route} setRoute={setRoute} open={sidebarOpen} setOpen={setSidebarOpen}/>
      <div className="main">
        <Topbar route={route} setSidebarOpen={setSidebarOpen}/>
        {pages[route]}
      </div>

      <div className={`tweaks ${tweaksOpen?'tweaks--on':''}`}>
        <div className="tweaks__head"><Icons.Sparkle size={14}/> Tweaks</div>
        <div className="tweaks__body">
          <div>
            <div className="tweaks__label" style={{marginBottom:6}}>강조색</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {['#2f6f4e','#1d4a34','#2f68c4','#6a4aa8','#b66f1c','#191918'].map(c=>(
                <button key={c} onClick={()=>setTweak({accent:c})} style={{
                  width:22,height:22,borderRadius:6,background:c,
                  border: tweaks.accent===c?'2px solid #000':'2px solid transparent',
                  outline:'1px solid var(--line-2)',cursor:'pointer',
                }}/>
              ))}
            </div>
          </div>
          <div className="tweaks__row">
            <span className="tweaks__label">논문 본문 Serif</span>
            <Toggle on={tweaks.serifArticle} onChange={on=>setTweak({serifArticle:on})}/>
          </div>
          <div className="tweaks__row">
            <span className="tweaks__label">흐르는 없지 애니메이션</span>
            <Toggle on={tweaks.animatedEdges} onChange={on=>setTweak({animatedEdges:on})}/>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
